version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql-crud
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cruddb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"

  spring-app:
    build: .
    container_name: crud-etudiant-app
    depends_on:
      - mysql
    ports:
      - "8082:8089"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cruddb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
